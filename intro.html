<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privé Belek — Luxury Golf Experiences</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0a1a10}

.video-wrap{position:fixed;inset:0;z-index:0}
.video-wrap video{width:100%;height:100%;object-fit:cover;object-position:center}
.ov1{position:fixed;inset:0;z-index:1;background:radial-gradient(ellipse at center,rgba(0,0,0,.15) 0%,rgba(0,0,0,.50) 100%)}
.ov2{position:fixed;inset:0;z-index:2;background:linear-gradient(to bottom,rgba(0,0,0,.40) 0%,rgba(0,0,0,.06) 28%,rgba(0,0,0,.06) 62%,rgba(0,0,0,.55) 100%)}

/* ── LANGUAGE SWITCHER ── */
.lang-switcher{
  position:fixed;top:28px;right:36px;z-index:100;
  display:flex;align-items:center;gap:6px;
  opacity:0;animation:fadeIn 1s 1.5s ease forwards;
}
.lang-switcher::before{
  content:'';display:block;width:20px;height:.5px;
  background:rgba(201,169,110,.4);margin-right:4px;
}
.lang-btn{
  font-family:'Montserrat',sans-serif;
  font-size:9px;font-weight:500;letter-spacing:.15em;
  color:rgba(245,241,235,.4);background:none;
  border:none;cursor:pointer;padding:4px 6px;
  transition:all .3s ease;text-transform:uppercase;
  position:relative;
}
.lang-btn:hover{color:rgba(201,169,110,.8);}
.lang-btn.active{
  color:#C9A96E;font-weight:600;
}
.lang-btn.active::after{
  content:'';position:absolute;bottom:-2px;left:6px;right:6px;
  height:1px;background:#C9A96E;
}

.stage{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 24px}

.logo{display:flex;flex-direction:column;align-items:center}
.logo-orn{display:flex;align-items:center;gap:12px;margin-bottom:18px;opacity:0;animation:fadeIn 1s 2.0s ease forwards}
.orn-l{width:48px;height:.5px;background:rgba(201,169,110,.6)}
.orn-d{width:5px;height:5px;background:#C9A96E;transform:rotate(45deg)}

.logo-prive{font-family:'Cormorant Garamond',serif;font-size:clamp(60px,10vw,110px);font-weight:300;letter-spacing:.28em;color:#F5F1EB;line-height:1;opacity:0;transform:translateY(12px);animation:riseIn 1.2s 2.2s cubic-bezier(.16,1,.3,1) forwards}
.logo-rule-w{width:100%;overflow:hidden;margin:12px 0 10px;opacity:0;animation:fadeIn .4s 3.0s ease forwards}
.logo-rule{height:.5px;background:linear-gradient(90deg,transparent,#C9A96E 20%,#C9A96E 80%,transparent);transform:scaleX(0);transform-origin:center;animation:expandR 1s 3.1s cubic-bezier(.16,1,.3,1) forwards}
@keyframes expandR{to{transform:scaleX(1)}}
.logo-belek{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,4.5vw,52px);font-weight:400;letter-spacing:.55em;color:#C9A96E;line-height:1;opacity:0;transform:translateY(-10px);animation:riseD 1.2s 3.2s cubic-bezier(.16,1,.3,1) forwards}
.logo-tag{font-family:'Montserrat',sans-serif;font-size:clamp(8px,1vw,10px);font-weight:300;letter-spacing:.55em;color:rgba(245,241,235,.35);text-transform:uppercase;margin-top:12px;opacity:0;animation:fadeIn 1s 3.8s ease forwards}
.logo-orn-b{display:flex;align-items:center;gap:12px;margin-top:18px;opacity:0;animation:fadeIn 1s 3.9s ease forwards}

.slogan-w{margin-top:44px;display:flex;flex-direction:column;align-items:center;gap:10px}
.slogan-tr{font-family:'Cormorant Garamond',serif;font-size:clamp(16px,2.8vw,28px);font-weight:300;font-style:italic;letter-spacing:.05em;color:rgba(245,241,235,.92);opacity:0;animation:fadeIn 1.4s 4.2s ease forwards}
.slogan-tr em{color:#C9A96E;font-style:italic}
.slogan-en{font-family:'Montserrat',sans-serif;font-size:clamp(9px,1.1vw,12px);font-weight:400;letter-spacing:.5em;text-transform:uppercase;color:rgba(201,169,110,.7);opacity:0;animation:fadeIn 1.4s 4.6s ease forwards}

/* ── PREMIUM CTA BUTTON ── */
.cta-w{margin-top:56px;opacity:0;animation:fadeIn 1.2s 5.2s ease forwards}

.btn-premium{
  position:relative;display:inline-flex;align-items:center;gap:14px;
  font-family:'Montserrat',sans-serif;
  font-size:11px;font-weight:500;letter-spacing:.45em;
  text-transform:uppercase;color:#C9A96E;
  background:rgba(10,26,16,.45);
  padding:18px 44px;
  border:1px solid rgba(201,169,110,.35);
  text-decoration:none;cursor:pointer;
  transition:all .5s cubic-bezier(.16,1,.3,1);
  backdrop-filter:blur(8px);
  overflow:hidden;
}
.btn-premium::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(201,169,110,.08) 0%,transparent 50%,rgba(201,169,110,.06) 100%);
  opacity:0;transition:opacity .5s ease;
}
.btn-premium::after{
  content:'';position:absolute;inset:-1px;
  background:linear-gradient(90deg,transparent,rgba(201,169,110,.5),transparent);
  opacity:0;transition:opacity .5s ease;z-index:-1;
}
.btn-premium:hover{
  color:#0a1a10;background:#C9A96E;border-color:#C9A96E;
  letter-spacing:.55em;
  box-shadow:0 8px 32px rgba(201,169,110,.25),0 0 60px rgba(201,169,110,.1);
  transform:translateY(-2px);
}
.btn-premium:hover::before{opacity:1}
.btn-premium:hover::after{opacity:.3}
.btn-premium:active{transform:translateY(0) scale(.98);box-shadow:0 4px 16px rgba(201,169,110,.15);}

.btn-orn{width:4px;height:4px;background:#C9A96E;transform:rotate(45deg);transition:background .5s,transform .5s;flex-shrink:0;}
.btn-premium:hover .btn-orn{background:#0a1a10;transform:rotate(45deg) scale(1.3);}

/* ── BOTTOM BAR ── */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:20;padding:28px 52px;display:flex;align-items:flex-end;justify-content:center;opacity:0;animation:fadeIn 1s 5.8s ease forwards}
.bot-loc{font-family:'Montserrat',sans-serif;font-size:10px;font-weight:400;letter-spacing:.35em;text-transform:uppercase;color:rgba(245,241,235,.65);display:flex;align-items:center;gap:10px}
.bot-loc::before{content:'';display:block;width:24px;height:.5px;background:rgba(201,169,110,.55)}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes riseIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes riseD{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="video-wrap">
  <video src="hero.webm" autoplay muted loop playsinline preload="auto"></video>
</div>
<div class="ov1"></div>
<div class="ov2"></div>

<!-- Language Switcher -->
<div class="lang-switcher">
  <button class="lang-btn active" data-lang="tr">TR</button>
  <button class="lang-btn" data-lang="de">DE</button>
  <button class="lang-btn" data-lang="en">EN</button>
  <button class="lang-btn" data-lang="ru">RU</button>
</div>

<div class="stage">
  <div class="logo">
    <div class="logo-orn"><div class="orn-l"></div><div class="orn-d"></div><div class="orn-l"></div></div>
    <div class="logo-prive">PRIVÉ</div>
    <div class="logo-rule-w"><div class="logo-rule"></div></div>
    <div class="logo-belek">BELEK</div>
    <div class="logo-tag" data-i18n="tag">Luxury Golf Experiences</div>
    <div class="logo-orn-b"><div class="orn-l"></div><div class="orn-d"></div><div class="orn-l"></div></div>
  </div>
  <div class="slogan-w">
    <div class="slogan-tr" data-i18n="slogan">Bir Golf Oyunundan <em>Çok Daha Fazlası</em></div>
    <div class="slogan-en" data-i18n="sloganSub">More than just a round of golf</div>
  </div>
  <div class="cta-w">
    <a class="btn-premium" id="btn" href="page2.html">
      <span class="btn-orn"></span>
      <span data-i18n="cta">Deneyimini Tasarla</span>
      <span class="btn-orn"></span>
    </a>
  </div>
</div>

<div class="bottom-bar">
  <div class="bot-loc" data-i18n="location">Belek · Antalya · Turkey</div>
</div>

<script>
// ── Translations ──
const translations = {
  tr: {
    tag: "Luxury Golf Experiences",
    slogan: "Bir Golf Oyunundan <em>Çok Daha Fazlası</em>",
    sloganSub: "More than just a round of golf",
    cta: "Deneyimini Tasarla",
    location: "Belek · Antalya · Turkey"
  },
  de: {
    tag: "Luxus Golf Erlebnisse",
    slogan: "Mehr als nur eine Runde <em>Golf</em>",
    sloganSub: "",
    cta: "Erlebnis Gestalten",
    location: "Belek · Antalya · Türkei"
  },
  en: {
    tag: "Luxury Golf Experiences",
    slogan: "More than just a <em>round of golf</em>",
    sloganSub: "",
    cta: "Design Your Experience",
    location: "Belek · Antalya · Turkey"
  },
  ru: {
    tag: "Роскошный Гольф",
    slogan: "Больше, чем просто <em>игра в гольф</em>",
    sloganSub: "",
    cta: "Создать Опыт",
    location: "Белек · Анталия · Турция"
  }
};

// ── Language Switcher Logic ──
const langBtns = document.querySelectorAll('.lang-btn');
const i18nEls = document.querySelectorAll('[data-i18n]');
const sloganSubEl = document.querySelector('[data-i18n="sloganSub"]');

function setLang(lang) {
  // Update active state
  langBtns.forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });

  // Update text content
  const t = translations[lang];
  i18nEls.forEach(el => {
    const key = el.dataset.i18n;
    if (t[key] !== undefined) {
      el.innerHTML = t[key];
    }
  });

  // Show/hide sloganSub based on language
  if (sloganSubEl) {
    sloganSubEl.style.display = (lang === 'tr') ? '' : 'none';
  }

  // Update html lang attribute
  document.documentElement.lang = lang;
}

langBtns.forEach(btn => {
  btn.addEventListener('click', () => setLang(btn.dataset.lang));
});

// ── CTA Click ──
const btn = document.getElementById('btn');
btn.addEventListener('click', e => {
  e.preventDefault();
  btn.style.pointerEvents = 'none';
  btn.style.opacity = '.7';
  // Save current language before navigating
  localStorage.setItem('privelang', document.documentElement.lang);
  setTimeout(() => { window.location.href = 'page2.html'; }, 400);
});
</script>
</body>
</html>
