<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#060f09}
.bg{position:fixed;inset:0;z-index:0}
.bg img{width:100%;height:100%;object-fit:cover;filter:brightness(.5) saturate(.8)}
.ov1{position:fixed;inset:0;z-index:1;background:radial-gradient(ellipse at center,rgba(0,0,0,.1),rgba(0,0,0,.6))}
.ov2{position:fixed;inset:0;z-index:2;background:linear-gradient(to bottom,rgba(0,0,0,.7) 0%,rgba(0,0,0,.15) 30%,rgba(0,0,0,.15) 65%,rgba(0,0,0,.75) 100%)}

/* TOP BAR */
.top-bar{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 44px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;opacity:0;animation:fi 1s .3s ease forwards}
.back-btn{font-family:'Montserrat',sans-serif;font-size:9px;letter-spacing:.3em;color:rgba(232,213,168,.75);text-decoration:none;text-transform:uppercase;display:flex;align-items:center;gap:10px;justify-self:start;transition:color .3s}
.back-btn::before{content:'←';font-size:14px;color:#C9A96E;transition:transform .3s}
.back-btn:hover{color:#F5F1EB}.back-btn:hover::before{transform:translateX(-4px)}
.step-w{display:flex;flex-direction:column;align-items:center;gap:5px;justify-self:center}
.step-circle{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid rgba(201,169,110,.5);background:rgba(6,15,9,.6);backdrop-filter:blur(10px)}
.step-num{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:#E8D5A8}
.step-lbl{font-family:'Montserrat',sans-serif;font-size:7.5px;letter-spacing:.4em;text-transform:uppercase;color:#C9A96E;white-space:nowrap}
.lang-sw{display:flex;gap:2px;justify-self:end}
.lb2{font-family:'Montserrat',sans-serif;font-size:9px;letter-spacing:.12em;color:rgba(245,241,235,.4);background:none;border:none;cursor:pointer;padding:5px 7px;text-transform:uppercase;position:relative;transition:color .3s}
.lb2.active{color:#E8D5A8;font-weight:500}
.lb2.active::after{content:'';position:absolute;bottom:0;left:7px;right:7px;height:.5px;background:#C9A96E}

/* HEADER */
.hdr{position:fixed;top:90px;left:0;right:0;z-index:100;text-align:center;opacity:0;animation:fi 1s .7s ease forwards}
.hotel-badge{font-family:'Montserrat',sans-serif;font-size:8px;letter-spacing:.5em;text-transform:uppercase;color:#C9A96E;margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:10px}
.hotel-badge::before,.hotel-badge::after{content:'';width:24px;height:.5px;background:rgba(201,169,110,.4)}
.hdr-title{font-family:'Cormorant Garamond',serif;font-size:clamp(20px,3vw,38px);font-weight:300;letter-spacing:.12em;color:#F5F1EB;text-shadow:0 4px 24px rgba(0,0,0,.8)}
.hdr-title em{color:#C9A96E;font-style:italic}
.hdr-sub{font-family:'Montserrat',sans-serif;font-size:8.5px;letter-spacing:.4em;text-transform:uppercase;color:rgba(232,213,168,.65);margin-top:7px}

/* SCROLL AREA */
.rw{position:fixed;top:200px;bottom:16px;left:0;right:0;z-index:10;overflow-y:auto;overflow-x:hidden;opacity:0;animation:fi 1.2s 1.1s ease forwards}
.rw::-webkit-scrollbar{width:2px}
.rw::-webkit-scrollbar-thumb{background:rgba(201,169,110,.2)}
.rg{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:10px;padding:0 36px 16px;max-width:1400px;margin:0 auto}

/* ROOM CARD */
.rc{background:linear-gradient(160deg,rgba(10,24,15,.9),rgba(4,10,7,.96));border:1px solid rgba(201,169,110,.15);overflow:hidden;transition:border-color .4s,box-shadow .4s}
.rc:hover{border-color:rgba(201,169,110,.4);box-shadow:0 12px 40px rgba(0,0,0,.5)}
.rc.sel{border:1.5px solid #C9A96E}
.rc-top-line{height:1.5px;background:linear-gradient(90deg,transparent,#C9A96E,transparent);opacity:0;transition:opacity .4s}
.rc:hover .rc-top-line,.rc.sel .rc-top-line{opacity:1}

/* IMAGE SLIDER */
.img-slider{position:relative;width:100%;height:175px;overflow:hidden;background:#0a1a10}
.img-track{display:flex;height:100%;transition:transform .4s cubic-bezier(.16,1,.3,1)}
.img-slide{flex:0 0 100%;height:100%;position:relative}
.img-slide img{width:100%;height:100%;object-fit:cover;filter:brightness(.85);transition:filter .3s}
.rc:hover .img-slide img{filter:brightness(.95)}
.cat-badge{position:absolute;top:8px;left:8px;font-family:'Montserrat',sans-serif;font-size:6px;letter-spacing:.25em;text-transform:uppercase;color:#E8D5A8;background:rgba(6,15,9,.72);border:.5px solid rgba(201,169,110,.28);padding:3px 8px;backdrop-filter:blur(4px)}

/* Slider controls */
.sl-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:5;width:28px;height:28px;border-radius:50%;background:rgba(6,15,9,.65);border:.5px solid rgba(201,169,110,.3);color:#C9A96E;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;opacity:0}
.img-slider:hover .sl-arrow{opacity:1}
.sl-arrow:hover{background:rgba(201,169,110,.2)}
.sl-prev{left:7px}.sl-next{right:7px}
.sl-dots{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);display:flex;gap:4px}
.sl-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.35);transition:background .3s;cursor:pointer}
.sl-dot.active{background:#C9A96E}

/* Card body */
.cb{padding:12px 16px 14px}
.rn{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;letter-spacing:.06em;color:#F5F1EB;line-height:1.2;margin-bottom:2px}
.rsz{font-family:'Montserrat',sans-serif;font-size:7.5px;letter-spacing:.3em;text-transform:uppercase;color:rgba(201,169,110,.6);margin-bottom:8px}
.rr{width:24px;height:.5px;background:linear-gradient(90deg,transparent,#C9A96E,transparent);margin:0 0 8px}
.rf{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.rfi{display:flex;align-items:center;gap:4px;font-family:'Montserrat',sans-serif;font-size:9px;font-weight:300;color:rgba(245,241,235,.7)}
.ball{width:6px;height:6px;border-radius:50%;background:radial-gradient(circle at 33% 33%,#F5E6C0 0%,#C9A96E 50%,#A07840 100%);flex-shrink:0}
.rd{font-family:'Montserrat',sans-serif;font-size:10px;font-weight:300;color:rgba(245,241,235,.55);line-height:1.6;margin-bottom:10px}
.rcap{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.caplbl{font-family:'Montserrat',sans-serif;font-size:7.5px;letter-spacing:.2em;text-transform:uppercase;color:rgba(201,169,110,.5)}
.persons{display:flex;gap:3px}
.pi{width:13px;height:13px;color:#C9A96E;opacity:.7}
.bsel{width:100%;font-family:'Montserrat',sans-serif;font-size:8px;letter-spacing:.4em;text-transform:uppercase;color:#E8D5A8;background:rgba(6,15,9,.5);padding:10px 0;border:.5px solid rgba(201,169,110,.28);cursor:pointer;position:relative;overflow:hidden;transition:all .4s}
.bsel::before{content:'';position:absolute;inset:0;background:#C9A96E;transform:scaleX(0);transform-origin:left;transition:transform .4s;z-index:-1}
.bsel:hover{color:#060f09;border-color:#C9A96E}.bsel:hover::before{transform:scaleX(1)}
.bsel.sel{background:#C9A96E;color:#060f09;border-color:#C9A96E}

/* LIGHTBOX */
.lbox{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.96);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.lbox.open{opacity:1;pointer-events:all}
.lbox img{max-width:90vw;max-height:88vh;object-fit:contain}
.lbx-close{position:absolute;top:18px;right:22px;width:38px;height:38px;border-radius:50%;background:rgba(201,169,110,.15);border:.5px solid rgba(201,169,110,.3);color:#C9A96E;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lbx-prev,.lbx-next{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(201,169,110,.15);border:.5px solid rgba(201,169,110,.3);color:#C9A96E;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lbx-prev{left:20px}.lbx-next{right:20px}
.lbx-ctr{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);font-family:'Montserrat',sans-serif;font-size:9px;letter-spacing:.3em;color:rgba(201,169,110,.5)}

@keyframes fi{from{opacity:0}to{opacity:1}}
</style>

/* ── Image fallback: tries webp → jpg → jpeg → png ── */
function imgFail(el){
  const src=el.src, ext=src.split('.').pop().toLowerCase();
  const base=src.slice(0,src.lastIndexOf('.'));
  const order=['webp','jpg','jpeg','png'];
  const next=order[order.indexOf(ext)+1];
  if(next){ el.src=base+'.'+next; } else { el.style.background='rgba(201,169,110,.08)'; el.style.minHeight='175px'; }
}

/* ── ENGINE ── */
const hotelKey = localStorage.getItem('priveHotel') || 'regnum';
const hotel = HOTELS[hotelKey] || HOTELS[Object.keys(HOTELS)[0]];
if(!hotel){ document.getElementById('rg').innerHTML='<p style="color:#C9A96E;padding:40px">Otel bulunamadı.</p>'; }

document.getElementById('hBadge').textContent = hotel?.name || '';

/* Person icons */
function persons(n){
  const svg='<svg class="pi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="7" r="4"/><path d="M4 21v-1a8 8 0 0116 0v1"/></svg>';
  return Array(Math.min(+n||0,8)).fill(svg).join('');
}

/* Render cards */
(hotel?.rooms||[]).forEach((room,ri)=>{
  const imgs = Array.isArray(room.imgs) ? room.imgs : [room.imgs];
  const folder = hotel.folder;

  const slides = imgs.map((img,si)=>`
    <div class="img-slide" data-ri="${ri}" data-si="${si}">
      <img src="${folder}/${img}" alt="${room.name}" loading="lazy" onerror="imgFail(this)">
    </div>`).join('');

  const dots = imgs.length>1 ? `<div class="sl-dots">${imgs.map((_,si)=>`<div class="sl-dot${si===0?' active':''}" data-si="${si}"></div>`).join('')}</div>` : '';
  const arrows = imgs.length>1 ? `<button class="sl-arrow sl-prev">‹</button><button class="sl-arrow sl-next">›</button>` : '';

  const card = document.createElement('div');
  card.className='rc'; card.dataset.ri=ri;
  card.innerHTML=`
    <div class="rc-top-line"></div>
    <div class="img-slider">
      <div class="img-track">${slides}</div>
      ${arrows}${dots}
      <div class="cat-badge">${room.cat}</div>
    </div>
    <div class="cb">
      <div class="rn">${room.name}</div>
      ${room.size?`<div class="rsz">${room.size}</div>`:''}
      <div class="rr"></div>
      <div class="rf">${(room.feat||[]).map(f=>`<div class="rfi"><div class="ball"></div>${f}</div>`).join('')}</div>
      <div class="rd">${room.desc||''}</div>
      ${room.cap?`<div class="rcap"><span class="caplbl">Kapasite</span><div class="persons">${persons(room.cap)}</div></div>`:''}
      <button class="bsel" data-ri="${ri}">S E Ç</button>
    </div>`;

  document.getElementById('rg').appendChild(card);

  /* Slider logic */
  if(imgs.length>1){
    const track = card.querySelector('.img-track');
    const dotsEl = card.querySelectorAll('.sl-dot');
    let cur=0;
    const go=n=>{ cur=(n+imgs.length)%imgs.length; track.style.transform=`translateX(-${cur*100}%)`; dotsEl.forEach((d,i)=>d.classList.toggle('active',i===cur)); };
    card.querySelector('.sl-prev').onclick=e=>{ e.stopPropagation(); go(cur-1); };
    card.querySelector('.sl-next').onclick=e=>{ e.stopPropagation(); go(cur+1); };
    dotsEl.forEach(d=>d.onclick=e=>{ e.stopPropagation(); go(+d.dataset.si); });

    /* Swipe */
    let tx=0;
    track.addEventListener('touchstart',e=>tx=e.touches[0].clientX,{passive:true});
    track.addEventListener('touchend',e=>{ const d=e.changedTouches[0].clientX-tx; if(Math.abs(d)>40) go(d<0?cur+1:cur-1); },{passive:true});
  }
});

/* Select */
document.getElementById('rg').addEventListener('click',e=>{
  const btn=e.target.closest('.bsel'); if(!btn) return;
  document.querySelectorAll('.bsel').forEach(b=>{b.classList.remove('sel');b.textContent='S E Ç'});
  document.querySelectorAll('.rc').forEach(c=>c.classList.remove('sel'));
  btn.classList.add('sel'); btn.textContent='✓ Seçildi';
  btn.closest('.rc').classList.add('sel');
  localStorage.setItem('priveRoom', hotel.rooms[+btn.dataset.ri].name);
  setTimeout(()=>window.location.href='page6.html',700);
});

/* Lightbox on image click */
let lbImgs=[],lbIdx=0;
document.getElementById('rg').addEventListener('click',e=>{
  const slide=e.target.closest('.img-slide');
  if(!slide||e.target.closest('.bsel')||e.target.closest('.sl-arrow')) return;
  const ri=+slide.dataset.ri, si=+slide.dataset.si;
  const imgs=Array.isArray(hotel.rooms[ri].imgs)?hotel.rooms[ri].imgs:[hotel.rooms[ri].imgs];
  lbImgs=imgs.map(img=>`${hotel.folder}/${img}`);
  lbIdx=si; showLB();
  document.getElementById('lbox').classList.add('open');
});
function showLB(){ document.getElementById('lbImg').src=lbImgs[lbIdx]; document.getElementById('lbCtr').textContent=`${lbIdx+1} / ${lbImgs.length}`; }
document.getElementById('lbClose').onclick=()=>document.getElementById('lbox').classList.remove('open');
document.getElementById('lbPrev').onclick=()=>{ lbIdx=(lbIdx-1+lbImgs.length)%lbImgs.length; showLB(); };
document.getElementById('lbNext').onclick=()=>{ lbIdx=(lbIdx+1)%lbImgs.length; showLB(); };
document.getElementById('lbox').onclick=e=>{ if(e.target===document.getElementById('lbox')) document.getElementById('lbox').classList.remove('open'); };
document.addEventListener('keydown',e=>{ if(e.key==='Escape') document.getElementById('lbox').classList.remove('open'); if(e.key==='ArrowLeft') document.getElementById('lbPrev').click(); if(e.key==='ArrowRight') document.getElementById('lbNext').click(); });

/* Lang */
document.querySelectorAll('.lb2').forEach(b=>b.onclick=()=>{ document.querySelectorAll('.lb2').forEach(x=>x.classList.remove('active')); b.classList.add('active'); localStorage.setItem('privelang',b.textContent); });
</script>
</body>
</html>
